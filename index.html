<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>GitLab Activity Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-header">
    <div class="header-content">
      <svg class="gitlab-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16 28.896 16 28.896 21.156 13.029 10.844 13.029 16 28.896" style="fill:#e24329"/>
        <polygon points="16 28.896 10.844 13.029 3.619 13.029 16 28.896" style="fill:#fc6d26"/>
        <path d="M3.619,13.029h0L2.052,17.851a1.067,1.067,0,0,0,.388,1.193L16,28.9,3.619,13.029Z" style="fill:#fca326"/>
        <path d="M3.619,13.029h7.225L7.739,3.473a.534.534,0,0,0-1.015,0L3.619,13.029Z" style="fill:#e24329"/>
        <polygon points="16 28.896 21.156 13.029 28.381 13.029 16 28.896" style="fill:#fc6d26"/>
        <path d="M28.381,13.029h0l1.567,4.822a1.067,1.067,0,0,1-.388,1.193L16,28.9,28.381,13.029Z" style="fill:#fca326"/>
        <path d="M28.381,13.029H21.156l3.105-9.557a.534.534,0,0,1,1.015,0l3.105,9.557Z" style="fill:#e24329"/>
      </svg>
      <h1>Activity Feed</h1>
    </div>
    <div style="display: flex; gap: 32px; align-items: center; justify-self: center;">
      <div id="clock-container">
        <div id="clock-time">--:--</div>
        <div id="clock-date">--</div>
      </div>
      <div id="weather-container" style="display: flex; flex-direction: column; align-items: center;">
        <div id="weather-icon" style="font-size: 22px; line-height: 1.2;">🌤️</div>
        <div id="weather-temp" style="font-size: 14px; font-weight: bold; color: #f8fafc; line-height: 1;">--°F</div>
      </div>
    </div>
    <div id="right-header">
      <div id="sync-container" style="display: none;">
        <div id="last-sync">Last synced: --:--</div>
        <div id="next-sync">Next sync in: --s</div>
      </div>
      <div id="status-container"></div>
    </div>
  </div>
  <div id="feed-container"></div>

  <!-- Offline Overlay -->
  <div id="offline-overlay" style="display: none;">
    <div class="offline-content">
      <div class="offline-icon">📡</div>
      <h2>Reconnecting to Network...</h2>
      <p id="offline-error-text"></p>
    </div>
  </div>

  <script type="module" src="/src/renderer.js"></script>
</body>

</html>
